<section class="contato-container">
  <div class="txt-header">
    <h1 class="titulo-sessao">Contato</h1>
    <p class="subtitulo">Vamos construir algo incrível juntos? Me mande uma mensagem!</p>
  </div>

  <div class="container d-flex justify-content-center">
    <div class="formulario-card">
      <form>
        <div class="mb-4">
          <label for="email" class="form-label">E-mail</label>
          <input type="email" class="form-control" id="email" placeholder="seuemail@exemplo.com">
        </div>

        <div class="mb-4">
          <label for="titulo" class="form-label">Assunto</label>
          <input type="text" class="form-control" id="titulo" placeholder="No que posso ajudar?">
        </div>

        <div class="mb-4">
          <label for="mensagem" class="form-label">Mensagem</label>
          <textarea class="form-control" id="mensagem" rows="4" placeholder="Escreva sua mensagem aqui..."></textarea>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn-enviar">
            <mat-icon>send</mat-icon> Enviar Mensagem
          </button>
        </div>
      </form>

      <div class="redes-sociais">
        <a href="https://github.com/KVergasta" target="_blank"><i class="bi bi-github"></i> GitHub</a>
        <a href="https://www.linkedin.com/in/kauane-vergasta-a3a602219/" target="_blank"><i class="bi bi-linkedin"></i> LinkedIn</a>
      </div>
    </div>
  </div>
</section>
